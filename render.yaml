services:
  - type: web
    name: agriguard-backend
    runtime: python312
    plan: free
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MONGO_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

  - type: web
    name: agriguard-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview -- --host 0.0.0.0
    envVars:
      - key: VITE_API_URL
        value: https://agriguard-backend.onrender.com/api
